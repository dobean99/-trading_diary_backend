services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-diary-api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload"
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "18081:8081"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-diary-worker
    command: celery -A app.core.celery_app:celery_app worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-diary-beat
    command: celery -A app.core.celery_app:celery_app beat -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: trading-diary-postgres
    environment:
      POSTGRES_DB: trading_diary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trading-diary-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
